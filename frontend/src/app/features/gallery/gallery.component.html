<section id="gallery" class="section-padding relative overflow-hidden">
  <div class="absolute inset-0 bg-luxelle -z-10"></div>

  <div class="section-container">

    <!-- Header -->
    <div class="section-header" appScrollReveal>
      <span class="section-eyebrow">Visual Showcase</span>
      <h2 class="mb-4">Our <span class="text-gradient">Gallery</span></h2>
      <div class="accent-divider"></div>
      <p class="text-luxelle-tertiary mt-5 max-w-lg mx-auto text-base leading-relaxed">
        Explore the beauty and elegance of our premium facilities and treatments.
      </p>
    </div>

    <!-- Gallery grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      <div
        *ngFor="let image of galleryImages; let i = index"
        appScrollReveal [animationType]="'fadeInUp'"
        class="group relative rounded-2xl overflow-hidden cursor-pointer
               bg-gradient-to-br from-rose-gold/10 to-warm-gold/8
               border border-luxelle-subtle
               hover:border-luxelle-medium
               transition-all duration-500 hover:shadow-luxelle-card-hover"
        [class.md:col-span-2]="i === 0"
        [class.row-span-2]="i === 3"
        [style.aspect-ratio]="i === 0 ? '16/9' : '1'"
        [style.animation-delay]="(i * 70) + 'ms'"
        (click)="openLightbox(image)"
      >
        <!-- Dot pattern -->
        <div class="absolute inset-0 opacity-[0.05]"
             style="background-image: radial-gradient(circle, var(--accent-primary) 1px, transparent 1px); background-size: 20px 20px;"></div>

        <!-- Center content -->
        <div class="absolute inset-0 flex flex-col items-center justify-center p-4 gap-3
                    transition-all duration-300">
          <div class="w-12 h-12 rounded-2xl bg-rose-gold/15 border border-rose-gold/20
                      flex items-center justify-center
                      group-hover:bg-rose-gold/25 group-hover:scale-110
                      transition-all duration-300">
            <lucide-icon name="image" class="w-5 h-5 text-rose-gold"></lucide-icon>
          </div>
          <p class="text-luxelle-secondary font-medium text-sm text-center leading-tight">{{ image.title }}</p>
          <span class="text-[10px] uppercase tracking-widest text-luxelle-tertiary">{{ image.category }}</span>
        </div>

        <!-- Hover overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent
                    opacity-0 group-hover:opacity-100 transition-opacity duration-300
                    flex items-end p-4">
          <div class="flex items-center gap-2 text-white/90">
            <lucide-icon name="zoom-in" class="w-4 h-4"></lucide-icon>
            <span class="text-xs font-semibold tracking-wide">View Image</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox -->
<div
  *ngIf="selectedImage()"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-sm"
  (click)="closeLightbox()"
>
  <div
    class="relative w-full max-w-2xl animate-scale-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Close -->
    <button
      (click)="closeLightbox()"
      class="absolute -top-12 right-0 w-10 h-10 rounded-xl flex items-center justify-center
             text-white/70 hover:text-white hover:bg-white/10 transition-all"
      aria-label="Close"
    >
      <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
    </button>

    <!-- Image card -->
    <div class="rounded-3xl overflow-hidden bg-gradient-to-br from-rose-gold/15 to-warm-gold/10
                border border-luxelle-medium shadow-luxelle-card-hover">
      <div class="aspect-video flex flex-col items-center justify-center gap-5 p-10">
        <div class="w-20 h-20 rounded-2xl bg-rose-gold/15 border border-rose-gold/20
                    flex items-center justify-center glow-rose">
          <lucide-icon name="image" class="w-8 h-8 text-rose-gold"></lucide-icon>
        </div>
        <div class="text-center">
          <p class="text-luxelle font-semibold text-lg">{{ selectedImage()?.title }}</p>
          <p class="text-luxelle-tertiary text-sm mt-1">{{ selectedImage()?.category }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
